<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZP Washim</title>

<style>

body{
background:orange;
font-family:sans-serif;
text-align:center;
}

.card{
background:#fff3d6;
width:90%;
margin:auto;
padding:15px;
border-radius:20px;
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:5px solid orange;
margin:auto;
overflow:hidden;
}

.circle img{
width:100%;
}

input{
width:80%;
padding:10px;
margin:5px;
}

button{
background:orange;
color:white;
padding:10px;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="card" id="card">
<div id="resultBox">
<h2>शिक्षण विभाग</h2>
<h3>जिल्हा परिषद वाशिम</h3>

<div class="circle">
<img id="preview">
</div>

<input type="file" onchange="loadImage(event)">

<br>
<div id="formArea">
<input placeholder="नाव" id="nameInput" oninput="showData()">
<input placeholder="पदनाम" id="postInput" oninput="showData()">
<input placeholder="शाळेचे नाव" id="schoolInput" oninput="showData()">

<p id="showName">नाव :</p>
<p id="showPost">पदनाम :</p>
<p id="showSchool">शाळेचे नाव :</p>
</div>
<button onclick="download()">WhatsApp Status डाउनलोड करा</button>

</div>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function loadImage(e){
document.getElementById("preview").src =
URL.createObjectURL(e.target.files[0]);
}

function showData(){

let name =
document.getElementById("nameInput").value;

let post =
document.getElementById("postInput").value;

let school =
document.getElementById("schoolInput").value;

document.getElementById("showName").innerText =
"नाव : " + name;

document.getElementById("showPost").innerText =
"पदनाम : " + post;

document.getElementById("showSchool").innerText =
"शाळेचे नाव : " + school;

}
function download(){

document.getElementById("formArea").style.display="none";

html2canvas(document.querySelector("#card"))
.then(canvas => {

let link=document.createElement("a");

link.download="status.png";

link.href=canvas.toDataURL();

link.click();

document.getElementById("formArea").style.display="block";

});

}
</script>

</body>
</html>
