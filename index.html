<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZP Washim</title>

<style>

body{
background:orange;
font-family:Arial, sans-serif;
text-align:center;
}

#resultBox{
background:#fff3d6;
width:320px;
margin:auto;
padding:15px;
border-radius:20px;
color:black;
font-size:18px;
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:5px solid orange;
margin:auto;
overflow:hidden;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

input{
width:90%;
padding:10px;
margin:5px;
font-size:16px;
}

button{
background:orange;
color:white;
padding:10px;
border:none;
border-radius:10px;
font-size:16px;
}

</style>

</head>

<body>

<div id="resultBox">

<h3>शिक्षण विभाग</h3>
<h3>जिल्हा परिषद वाशिम</h3>

<div class="circle">
<img id="preview">
</div>

<p id="showName">नाव :</p>
<p id="showPost">पदनाम :</p>
<p id="showSchool">शाळेचे नाव :</p>

</div>

<br>

<input type="file" onchange="loadImage(event)">

<input id="nameInput" placeholder="नाव" oninput="showData()">
<input id="postInput" placeholder="पदनाम" oninput="showData()">
<input id="schoolInput" placeholder="शाळेचे नाव" oninput="showData()">

<br>

<button onclick="download()">Download</button>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function loadImage(e){
document.getElementById("preview").src =
URL.createObjectURL(e.target.files[0]);
}

function showData(){

document.getElementById("showName").innerHTML =
"नाव : " + document.getElementById("nameInput").value;

document.getElementById("showPost").innerHTML =
"पदनाम : " + document.getElementById("postInput").value;

document.getElementById("showSchool").innerHTML =
"शाळेचे नाव : " + document.getElementById("schoolInput").value;

}


function download(){

html2canvas(document.getElementById("resultBox"),{
scale:2
}).then(canvas => {

var link=document.createElement("a");

link.download="status.png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>

</body>
</html>
