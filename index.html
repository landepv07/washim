<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>जिल्हा परिषद वाशिम</title>

<style>

body{
background:linear-gradient(orange,#ffcc66);
font-family:sans-serif;
text-align:center;
margin:0;
}

.card{
background:#fff3d6;
width:95%;
max-width:500px;
margin:auto;
margin-top:10px;
padding:15px;
border-radius:20px;
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:5px solid orange;
margin:auto;
overflow:hidden;
background:white;
}

.circle img{
width:100%;
}

input{
width:85%;
padding:10px;
margin:5px;
border:none;
border-bottom:2px dashed orange;
font-size:16px;
}

button{
background:orange;
color:white;
padding:10px;
border:none;
border-radius:15px;
margin:5px;
}

</style>

</head>

<body>

<div class="card">

<h2>शिक्षण विभाग</h2>
<h3>जिल्हा परिषद वाशिम</h3>

<div class="circle">
<img id="preview">
</div>

<input type="file" onchange="loadImage(event)">

<h3>होय, मी जि. प. शाळेत शिकलोय !</h3>

<input placeholder="नाव">
<input placeholder="पदनाम">
<input placeholder="शाळेचे नाव">

<br>

<button>माझी शाळा माझे वैभव</button>

<button onclick="download()">WhatsApp Status डाउनलोड करा</button>

</div>

<script>

function loadImage(e){
document.getElementById("preview").src =
URL.createObjectURL(e.target.files[0]);
}

function download(){
alert("Status ready");
}

</script>

</body>
</html>
