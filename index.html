<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZP Washim</title>

<style>

body{
background:orange;
font-family:Arial, sans-serif;
text-align:center;
}

#resultBox{
background:#fff3d6;
width:320px;
margin:auto;
padding:15px;
border-radius:20px;
color:black;
font-size:18px;
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:5px solid orange;
margin:auto;
overflow:hidden;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

input{
width:90%;
padding:10px;
margin:5px;
font-size:16px;
}

button{
background:linear-gradient(45deg,#ff6600,#ff9900);
color:white;
padding:12px 20px;
border:none;
border-radius:25px;
font-size:18px;
font-weight:bold;
box-shadow:0 4px 8px rgba(0,0,0,0.3);
margin-top:10px;
}

button:hover{
background:linear-gradient(45deg,#ff3300,#ff6600);
}
#showName{
font-size:20px;
font-weight:bold;
color:#cc0000;
}

#showPost{
font-size:18px;
font-weight:bold;
color:#003399;
}

#showSchool{
font-size:18px;
font-weight:bold;
color:#006600;
}h2{
  color:#cc0000;
  font-size:26px;
  font-weight:bold;
  text-shadow:1px 1px 2px black;
  margin:5px;
  text-align:center;
  border-bottom:2px solid orange;
  padding-bottom:5px;
}

h3{
  color:#003399;
  font-size:22px;
  font-weight:bold;
  text-shadow:1px 1px 2px gray;
  margin:5px;
  text-align:center;
}
</style>

</head>

<body>

<div id="resultBox">
<img src="20250826967859708.jpg" id="logo">
<h3>शिक्षण विभाग</h3>
<h3>जिल्हा परिषद वाशिम</h3>

<div class="circle">
<img id="preview">
</div>

<p id="showName">नाव :</p>
<p id="showPost">पदनाम :</p>
<p id="showSchool">शाळेचे नाव :</p>

</div>

<br>

<input type="file" onchange="loadImage(event)">

<input id="nameInput" placeholder="नाव" oninput="showData()">
<input id="postInput" placeholder="पदनाम" oninput="showData()">
<input id="schoolInput" placeholder="शाळेचे नाव" oninput="showData()">

<br>

<button onclick="download()">Download</button>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function loadImage(e){
document.getElementById("preview").src =
URL.createObjectURL(e.target.files[0]);
}

function showData(){

document.getElementById("showName").innerHTML =
"नाव : " + document.getElementById("nameInput").value;

document.getElementById("showPost").innerHTML =
"पदनाम : " + document.getElementById("postInput").value;

document.getElementById("showSchool").innerHTML =
"शाळेचे नाव : " + document.getElementById("schoolInput").value;

}


function download(){

html2canvas(document.getElementById("resultBox"),{
scale:2
}).then(canvas => {

var link=document.createElement("a");

link.download="status.png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>

</body>
</html>
