<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>जिल्हा परिषद वाशिम</title>

<style>

body{
background:linear-gradient(orange,#ffcc66);
font-family:sans-serif;
text-align:center;
margin:0;
}

.card{
background:#fff3d6;
width:95%;
max-width:500px;
margin:auto;
margin-top:10px;
padding:15px;
border-radius:20px;
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:5px solid orange;
margin:auto;
overflow:hidden;
background:white;
}

.circle img{
width:100%;
}

input{
width:85%;
padding:10px;
margin:5px;
border:none;
border-bottom:2px dashed orange;
font-size:16px;
}

button{
background:orange;
color:white;
padding:10px;
border:none;
border-radius:15px;
margin:5px;
}

</style>

</head>

<body>

<div class="card">
<img src="20250826967859708.jpg" width="100">
<h2>शिक्षण विभाग</h2>
<h3>जिल्हा परिषद वाशिम</h3>

<div class="circle">
<img id="preview">
</div>

<input type="file" onchange="loadImage(event)">
<h3>होय, मी जि. प. शाळेत शिकलोय !</h3>
<label>नाव :</label><br>
<input placeholder="नाव" oninput="showData()"><br>
<p id="showName"></p>
<p id="showPost"></p>
<p id="showSchool"></p>
<label>पदनाम :</label><br>
<input placeholder="पदनाम" oninput="showData2()"><br>

<label>शाळेचे नाव :</label><br>
<input placeholder="शाळेचे नाव" oninput="showData3()"><br>
<br>

<button>माझी शाळा माझे वैभव</button>

<button onclick="download()">WhatsApp Status डाउनलोड करा</button>

</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function loadImage(e){
document.getElementById("preview").src =
URL.createObjectURL(e.target.files[0]);
}function showData(){
document.getElementById("showName").innerText =
"नाव : " +
document.getElementsByTagName("input")[1].value;
}

function showData2(){
document.getElementById("showPost").innerText =
"पदनाम : " +
document.getElementsByTagName("input")[2].value;
}

function showData3(){
document.getElementById("showSchool").innerText =
"शाळेचे नाव : " +
document.getElementsByTagName("input")[3].value;
}
function download(){

html2canvas(document.querySelector(".card")).then(canvas => {

let link = document.createElement("a");

link.download = "status.png";

link.href = canvas.toDataURL("image/png");

link.click();

});

}

</script>
</body>
</html>
